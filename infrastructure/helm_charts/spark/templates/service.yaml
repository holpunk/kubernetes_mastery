apiVersion: v1
kind: Service
metadata:
  name: {{ include "spark.fullname" . }}-master
  labels:
    {{- include "spark.labels" . | nindent 4 }}
    app.kubernetes.io/component: master
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: spark-ui
      protocol: TCP
      name: http
    - port: 7077
      targetPort: spark-master
      protocol: TCP
      name: spark-master
  selector:
    {{- include "spark.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: master
