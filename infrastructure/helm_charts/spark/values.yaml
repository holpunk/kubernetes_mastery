# Default values for spark.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: bitnami/spark
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "3.5.0"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}
podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true # Changed to true to enable Ingress
  className: ""
  annotations:
    # cert-manager.io/cluster-issuer: "letsencrypt-prod" # Example for Let's Encrypt
    # cert-manager.io/issuer: "letsencrypt-staging" # Example for a namespace-scoped issuer
    # Add your cert-manager issuer annotation here. Uncomment one of the above or add your own.
    # For a self-signed issuer, you might use:
    cert-manager.io/cluster-issuer: "selfsigned-issuer"
  hosts:
    - host: spark.example.com # IMPORTANT: Change this to your desired hostname
      paths:
        - path: /
          pathType: Prefix # Changed to Prefix for broader matching
  tls:
    - secretName: spark-tls-secret # This secret will be created by cert-manager
      hosts:
        - spark.example.com # IMPORTANT: Change this to your desired hostname

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

# cert-manager specific configuration
certManager:
  # Specify the cert-manager issuer to use. This can be a ClusterIssuer or an Issuer.
  # Example: "letsencrypt-prod", "selfsigned-issuer"
  issuer: "selfsigned-issuer" # Default to selfsigned for demonstration
